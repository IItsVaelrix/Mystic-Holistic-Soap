# Fly.io configuration for Saponification Bench.
# Rename `app` to your own unique Fly app name, and pick a region near you.
# See the "Deploy to Fly.io" section of README.md for the full walkthrough.

app = "mystic-holistic-soap"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"
  # HTTP Basic Auth username (not secret). The password hash is a Fly secret:
  #   npm run hash-password -- "<password>"
  #   fly secrets set AUTH_PASSWORD_HASH="<output>"
  AUTH_USER = "mystic"

# PUBLIC HTTP service on https://<app>.fly.dev.
# NOTE: this app ships NO authentication, so a public URL gives anyone who has
# the link full read/write access to the recipe/inventory API. See the
# "Optional: password-protect it" note in README.md to lock it down.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Data is ephemeral (no volume): recipes/inventory/molds reset to the seeded
# defaults on each deploy. To persist across deploys, add a mount and volume:
#   [[mounts]]
#     source = "soap_data"
#     destination = "/app/data"
#   # fly volumes create soap_data --size 1 --region iad

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
